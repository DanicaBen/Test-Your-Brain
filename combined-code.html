<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST YOUR BRAIN</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            overflow:hidden;
            background: linear-gradient(120deg,#74ebd5,#9face6,#ffdde1);
            background-size:400% 400%;
            animation:bgMove 8s infinite alternate;
        }

        @keyframes bgMove{
            0%{background-position:left;}
            100%{background-position:right;}
        }

        .container{
            background:white;
            width:720px;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px gray;
            text-align:center;
            position:relative;
            z-index:100;
        }

        h1{ color:darkblue; }

        input,select,button{
            padding:10px;
            margin:10px;
            font-size:16px;
            width:250px;
        }

        button{
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:green;
            color:white;
            width:180px;
        }

        button:hover{
            background:darkgreen;
        }

        #avatar{
            font-size:80px;
            margin:15px;
        }

        .option-btn{
            display:block;
            width:90%;
            margin:10px auto;
            padding:14px;
            background:#ffffff;
            color:#000;
            border:2px solid #444;
            border-radius:10px;
            cursor:pointer;
            font-size:17px;
            font-weight:bold;
            transition:0.3s;
        }

        .option-btn:hover{
            background:#d9f0ff;
            transform:scale(1.03);
        }

        #quizSection{ display:none; }

        #message{
            font-size:22px;
            font-weight:bold;
            margin:15px;
            color:darkblue;
            min-height:30px;
        }

        #result{
            font-size:24px;
            font-weight:bold;
            margin-top:20px;
        }

        #progress{
            font-size:18px;
            color:purple;
            margin:10px;
            font-weight:bold;
        }

        .dance{
            animation:danceMove 0.5s infinite alternate;
        }

        @keyframes danceMove{
            0%{transform:translateX(-10px) rotate(-10deg);}
            50%{transform:translateX(10px) rotate(10deg);}
            100%{transform:translateY(-5px);}
        }

        .confetti{
            position:fixed;
            width:10px;
            height:10px;
            top:-10px;
            animation:fall 4s linear infinite;
            z-index:1;
        }

        @keyframes fall{
            from{transform:translateY(0) rotate(0deg);}
            to{transform:translateY(100vh) rotate(360deg);}
        }

        #celebrate{
            font-size:28px;
            color:red;
            font-weight:bold;
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 TEST YOUR BRAIN 🧠</h1>

    <div id="profileSection">
        <input type="text" id="username" placeholder="Enter Your Name"><br>
        <input type="email" id="email" placeholder="Enter Your Email"><br>

        <select id="gender" onchange="generateAvatar()">
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <div id="avatar">🙂</div>
        <button onclick="startQuizApp()">Start Quiz</button>
    </div>

    <div id="quizSection">
        <h2 id="welcomeUser"></h2>
        <div id="progress"></div>
        <div id="timer">Time Left: 20s</div>
        <h3 id="question"></h3>
        <div id="options"></div>
        <div id="message"></div>
        <div id="result"></div>
        <div id="celebrate"></div>
        <button onclick="restartQuiz()">Restart Quiz</button>
    </div>
</div>

<script>
function generateAvatar(){
    let g=document.getElementById("gender").value;
    if(g=="male") document.getElementById("avatar").innerText="🕺";
    else if(g=="female") document.getElementById("avatar").innerText="💃";
    else document.getElementById("avatar").innerText="🙂";
}

function startQuizApp(){
    let name=document.getElementById("username").value;
    let email=document.getElementById("email").value;
    let gender=document.getElementById("gender").value;

    if(name=="" || email=="" || gender==""){
        alert("Please fill all details");
        return;
    }

    document.getElementById("profileSection").style.display="none";
    document.getElementById("quizSection").style.display="block";
    document.getElementById("welcomeUser").innerText="Welcome "+name+" ("+email+") "+document.getElementById("avatar").innerText;

    shuffleQuestions();
    currentQuestion=0;
    score=0;
    loadQuestion();
}

let questions=[
    {question:"What does HTML stand for?",options:["Hyper Text Markup Language","High Tool Markup Language","Home Tool Markup Language","Hyperlink Text Makeup Language"],answer:"Hyper Text Markup Language"},
    {question:"Which language is used for styling web pages?",options:["HTML","CSS","C","Python"],answer:"CSS"},
    {question:"Which language is used for dynamic website functionality?",options:["JavaScript","C++","Java","SQL"],answer:"JavaScript"},
    {question:"What does CSS stand for?",options:["Cascading Style Sheet","Computer Style Sheet","Creative Style Sheet","Colorful Style Sheet"],answer:"Cascading Style Sheet"},
    {question:"Which company developed JavaScript?",options:["Netscape","Google","Microsoft","Oracle"],answer:"Netscape"},
    {question:"Which tag inserts image in HTML?",options:["img","pic","image","src"],answer:"img"},
    {question:"Which symbol is used for id selector in CSS?",options:["#",".","*","$"],answer:"#"},
    {question:"Which method displays message box in JavaScript?",options:["alert()","msg()","show()","display()"],answer:"alert()"}
];

let selectedQuestions=[];
let currentQuestion=0;
let score=0;
let timeLeft=20;
let timer;

function shuffleQuestions(){
    selectedQuestions=[...questions].sort(()=>Math.random()-0.5).slice(0,5);
}

function loadQuestion(){
    clearInterval(timer);
    timeLeft=20;
    startTimer();

    document.getElementById("message").innerText="";
    document.getElementById("progress").innerText="Question "+(currentQuestion+1)+" of 5";

    let q=selectedQuestions[currentQuestion];
    document.getElementById("question").innerText=q.question;

    let optionsDiv=document.getElementById("options");
    optionsDiv.innerHTML="";

    q.options.forEach(function(opt){
        let btn=document.createElement("button");
        btn.innerText=opt;
        btn.className="option-btn";
        btn.onclick=function(){checkAnswer(opt);};
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected){
    if(selected===selectedQuestions[currentQuestion].answer){
        score++;
        document.getElementById("message").innerText="🎉 Brilliant! Correct Answer!";
    }else{
        document.getElementById("message").innerText="😅 Not this one! Next chance!";
    }
    setTimeout(nextQuestion,1000);
}

function nextQuestion(){
    currentQuestion++;
    if(currentQuestion<5) loadQuestion();
    else showResult();
}

function startTimer(){
    document.getElementById("timer").innerText="⏰ Time Left: "+timeLeft+"s";
    timer=setInterval(function(){
        timeLeft--;
        document.getElementById("timer").innerText="⏰ Time Left: "+timeLeft+"s";
        if(timeLeft<=0){
            clearInterval(timer);
            document.getElementById("message").innerText="⌛ Time Up!";
            setTimeout(nextQuestion,1000);
        }
    },1000);
}

function createConfetti(){
    for(let i=0;i<30;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.backgroundColor=hsl(${Math.random()*360},100%,50%);
        c.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(c);
    }
}

function showResult(){
    clearInterval(timer);
    document.getElementById("question").style.display="none";
    document.getElementById("options").style.display="none";
    document.getElementById("timer").style.display="none";
    document.getElementById("progress").style.display="none";
    document.getElementById("message").innerText="";

    let avatar=document.getElementById("avatar");
    avatar.classList.add("dance");
    document.getElementById("quizSection").insertBefore(avatar,document.getElementById("result"));

    document.getElementById("result").innerText="🏆 Brain Test Completed! Your Score: "+score+"/5";
    document.getElementById("celebrate").innerText="👏👏 AMAZING WORK 👏👏";

    createConfetti();
}

function restartQuiz(){
    location.reload();
}
</script>

</body>
</html>
